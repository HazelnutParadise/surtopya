name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
      - name: Test
        run: go test ./... -cover

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      # Keep Node available for tooling that assumes it (Playwright, etc).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.5"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Unit Tests
        run: bunx vitest run
      - name: i18n Check
        run: bun run check:i18n
      - name: Build
        run: bun run build
      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium
      - name: E2E
        env:
          CI: true
          REQUIRE_BOOTSTRAP_AUTH: "false"
        run: bun run e2e
