services:
  web:
    image: surtopya-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8080/api/v1}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-${PUBLIC_API_URL}}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - LOGTO_ENDPOINT=${LOGTO_ENDPOINT:-}
      - LOGTO_APP_ID=${LOGTO_APP_ID:-}
      - LOGTO_APP_SECRET=${LOGTO_APP_SECRET:-}
      - LOGTO_COOKIE_SECRET=${LOGTO_COOKIE_SECRET:-complex_password_at_least_32_characters_long}
      - LOGTO_AUDIENCE=${LOGTO_AUDIENCE:-}
      - JWT_SECRET=${JWT_SECRET:-development-secret-key}
      - INTERNAL_APP_SIGNING_SECRET=${INTERNAL_APP_SIGNING_SECRET:-development-internal-app-secret}
      - REQUIRE_BOOTSTRAP_AUTH=${REQUIRE_BOOTSTRAP_AUTH:-false}
    depends_on:
      - api
    restart: always

  api:
    image: surtopya-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - GIN_MODE=release
      - SURTOPYA_ENV=${SURTOPYA_ENV:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-surtopya}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET:-development-secret-key}
      - INTERNAL_APP_SIGNING_SECRET=${INTERNAL_APP_SIGNING_SECRET:-development-internal-app-secret}
      - ALLOW_UNVERIFIED_JWT=${ALLOW_UNVERIFIED_JWT:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - DATASETS_DIR=${DATASETS_DIR:-/data/datasets}
      - LOGTO_JWKS_URL=${LOGTO_JWKS_URL:-}
      - LOGTO_ISSUER=${LOGTO_ISSUER:-}
      - LOGTO_AUDIENCE=${LOGTO_AUDIENCE:-}
      - MIGRATIONS_DIR=${MIGRATIONS_DIR:-./migrations}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    volumes:
      - type: bind
        source: ${API_DATASETS_HOST_PATH:-./.data/datasets}
        target: /data/datasets

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-surtopya}
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_HOST_PATH:-./.data/postgres}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
